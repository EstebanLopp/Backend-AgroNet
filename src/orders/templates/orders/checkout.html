{% extends "base.html" %}

{% block content %}

<h2>Resumen de compra</h2>

<table>
    {% for item in cart %}
    <tr>
        <td>{{ item.product.name }}</td>
        <td>{{ item.quantity }}</td>
        <td>${{ item.total_price }}</td>
    </tr>
    {% endfor %}
</table>

<p>Total: ${{ cart.get_total_price }}</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar compra</button>
</form>

{% endblock %}
