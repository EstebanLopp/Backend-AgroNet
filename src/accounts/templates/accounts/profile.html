{% extends "base.html" %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="profile-card">

<h3>Editar perfil</h3>

<form method="post" class="profile-form">

{% csrf_token %}

<div class="form-group">
<label>Nombre</label>
{{ form.first_name }}
</div>

<div class="form-group">
<label>Apellido</label>
{{ form.last_name }}
</div>

<div class="form-group">
<label>Email</label>
{{ form.email }}
</div>

<button class="btn btn-primary w-100">
Guardar cambios
</button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
