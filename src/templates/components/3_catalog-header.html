<header class="catalog-header">
  <h2 class="catalog-header__title">¡Explora todos nuestros productos!</h2>

  <div class="catalog-header__filters">

    <!-- Buscador REAL (GET ?q=...) -->
    <form method="GET" class="catalog-header__search-form">
      <input
        type="text"
        name="q"
        placeholder="Buscar producto..."
        class="catalog-header__search"
        value="{{ query|default:'' }}"
      />
    </form>

    <!-- Dropdown REAL (categorías desde BD) -->
    <div class="catalog-header__dropdown">
      <button type="button" class="catalog-header__dropdown__button">
        <span class="catalog-header__dropdown__text">
          {% if category %}
            <em>{{ category.name }}</em>
          {% else %}
            <em>Categoría</em>
          {% endif %}
        </span>
        <i class="fa-solid fa-chevron-down catalog-header__dropdown__icon"></i>
      </button>

      <ul class="catalog-header__dropdown__list">
        <li class="catalog-header__dropdown__item">
          <a href="{% url 'product_list' %}">Todas</a>
        </li>

        {% for cat in categories %}
          <li class="catalog-header__dropdown__item">
            <a href="{% url 'products_by_category' cat.slug %}{% if query %}?q={{ query }}{% endif %}">
              {{ cat.name }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </div>

  </div>
</header>

<hr class="catalog-header__divider" />
