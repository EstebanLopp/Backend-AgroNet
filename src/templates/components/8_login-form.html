<div class="login">
  <section class="login__box">
    <h2 class="login__title">Iniciar sesión</h2>
    <hr class="login__divider">

    <form class="login__form" method="post" action="{% url 'login' %}">
      {% csrf_token %}

      <!-- Mensaje de error si credenciales inválidas -->
      {% if form.errors %}
        <p class="login__error">Usuario o contraseña incorrectos.</p>
      {% endif %}

      <input
        class="login__input"
        type="text"
        name="username"
        placeholder="Correo electrónico, teléfono o usuario"
        required
      >

      <input
        class="login__input"
        type="password"
        name="password"
        placeholder="Contraseña"
        required
      >

      <button class="login__button" type="submit">Iniciar sesión</button>
    </form>

    <!-- (Opcional) Si luego hacemos reset de contraseña, lo conectamos -->
    {# <a href="{% url 'password_reset' %}" class="login__forgot">¿Olvidaste tu contraseña?</a> #}

    <a href="#" class="login__forgot">¿Olvidaste tu contraseña?</a>

    <hr class="login__divider">

    <a href="{% url 'signup' %}">
      <button class="login__button login__button--secondary" type="button">
        Crear cuenta nueva
      </button>
    </a>
  </section>
</div>

<div class="login__background"></div>
