{% load static %}

<header class="head">
  <nav class="navbar-general">
    
    <div class="navbar__general-brand">
      <img 
        src="{% static 'assets/logo-light-transparent.png' %}" 
        alt="Logo AgroNet" 
        class="navbar__general-logo"
      >
    </div>

    <ul class="navbar__general-list">
      <li class="navbar__general-item">
        <a href="{% url 'index' %}" class="navbar__general-link">Inicio</a>
      </li>

      <li class="navbar__general-item">
        <a href="{% url 'product_list' %}" class="navbar__general-link">Catálogo</a>
      </li>

      <li class="navbar__general-item">
        <a href="{% url 'contact' %}" class="navbar__general-link">Contacto</a>
      </li>

      <li class="navbar__general-item">
        <a href="{% url 'cart_detail' %}" class="navbar__general-link navbar__general-link--icon">
          <i class="fa-solid fa-cart-shopping"></i>
          Carrito ({{ cart|length }})
        </a>
      </li>

      <li class="navbar__general-item">
          {% if user.is_authenticated %}
            <details class="navbar__profile">
              <summary class="navbar__general-link navbar__general-link--icon" style="list-style:none; cursor:pointer;">
                <i class="fa-solid fa-user"></i>
                {{ user.username }}
              </summary>

              <div class="navbar__profile-menu">
                <a href="{% url 'customer_dashboard' %}" class="navbar__profile-item">
                  <i class="fa-solid fa-user-gear"></i> Mi cuenta
                </a>

                <a href="{% url 'orders:my_orders' %}" class="navbar__profile-item">
                  <i class="fa-solid fa-receipt"></i> Mis pedidos
                </a>

                <form action="{% url 'logout' %}" method="post" class="navbar__profile-item" style="margin:0;">
                  {% csrf_token %}
                  <button type="submit" class="navbar__profile-logout">
                    <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
                  </button>
                </form>
              </div>
            </details>
          {% else %}
            <a href="{% url 'login' %}" class="navbar__general-link navbar__general-link--icon">
              <i class="fa-solid fa-user"></i>
              Iniciar sesión
            </a>
          {% endif %}
        </li>

    </ul>
  </nav>
</header>
