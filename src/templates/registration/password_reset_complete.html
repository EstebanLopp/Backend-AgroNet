{% extends "base.html" %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Contraseña actualizada</h1>
    <p class="auth-subtitle">
      Tu contraseña fue restablecida correctamente. Ya puedes iniciar sesión con tu nueva clave.
    </p>

    <div class="auth-footer-links">
      <a href="{% url 'login' %}" class="auth-button auth-button--link">
        Iniciar sesión
      </a>
    </div>
  </div>
</section>
{% endblock %}
