{% extends "base.html" %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Revisa tu correo</h1>
    <p class="auth-subtitle">
      Si existe una cuenta asociada a ese correo, enviamos un enlace para restablecer la contraseña.
    </p>

    <div class="auth-helper">
      Revisa también la carpeta de spam o correo no deseado.
    </div>

    <div class="auth-footer-links">
      <a href="{% url 'login' %}" class="auth-link">Volver al inicio de sesión</a>
    </div>
  </div>
</section>
{% endblock %}
